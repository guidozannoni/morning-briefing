<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market Briefing</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080c10; color: #c8d4e0; font-family: 'IBM Plex Mono', monospace; font-size: 13px; min-height: 100vh; }
.grid { position: fixed; inset: 0; pointer-events: none; background-image: linear-gradient(rgba(0,200,120,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,120,0.03) 1px, transparent 1px); background-size: 40px 40px; }
header { border-bottom: 1px solid #1a2a1a; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; background: rgba(8,12,16,0.97); position: sticky; top: 0; z-index: 10; }
.brand { display: flex; align-items: center; gap: 10px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #1a3a1a; transition: all 0.3s; }
.dot.loading { background: #ffb800; box-shadow: 0 0 8px #ffb800; animation: pulse 1s infinite; }
.dot.ready { background: #00ff9d; box-shadow: 0 0 8px #00ff9d; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.brand-name { font-size: 11px; letter-spacing: 3px; color: #4a6a4a; text-transform: uppercase; }
.date { font-size: 11px; color: #4a6a4a; }
main { max-width: 860px; margin: 0 auto; padding: 32px 24px; }
.hero { text-align: center; padding: 48px 0 36px; }
.title { font-size: 28px; font-weight: 600; color: #c8d4e0; letter-spacing: 1px; }
.subtitle { margin-top: 10px; font-size: 11px; color: #4a6a4a; letter-spacing: 1px; }
.btn-wrap { display: flex; justify-content: center; margin: 32px 0; }
button { background: transparent; border: 1px solid #1a4a1a; color: #00cc77; padding: 14px 48px; font-family: inherit; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
button:hover { background: rgba(0,200,100,0.06); border-color: #00cc77; box-shadow: 0 0 20px rgba(0,200,100,0.1); }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.loading-msg { text-align: center; color: #4a6a4a; font-size: 11px; letter-spacing: 2px; animation: pulse 1.5s infinite; padding: 24px 0; }
.error { background: rgba(200,0,0,0.08); border: 1px solid #4a1a1a; color: #f06292; padding: 16px; margin: 24px 0; font-size: 11px; }
.sections { display: flex; flex-direction: column; gap: 2px; margin-top: 8px; }
.section { border-left: 3px solid; padding: 18px 20px; background: rgba(255,255,255,0.02); }
.section-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; margin-bottom: 12px; }
.section-body { color: #a0b0c0; line-height: 1.9; font-size: 12px; }
.section-body p { margin-bottom: 4px; }
.section-body strong { color: #c8d4e0; }
.footer-ts { text-align: center; padding: 32px 0 16px; font-size: 10px; color: #2a4a2a; letter-spacing: 2px; }
#result { display: none; }
</style>
</head>
<body>
<div class="grid"></div>
<header>
  <div class="brand">
    <div class="dot" id="dot"></div>
    <span class="brand-name">Market Terminal</span>
  </div>
  <span class="date" id="dateStr"></span>
</header>
<main>
  <div id="hero">
    <div class="hero">
      <p class="title">MORNING BRIEFING</p>
      <p class="subtitle">azionario · tassi · movers · macro · news</p>
    </div>
    <div class="btn-wrap">
      <button id="btn" onclick="generate()">▶ GENERA BRIEFING</button>
    </div>
  </div>
  <div id="loadingMsg" class="loading-msg" style="display:none">ricerca in corso su Bloomberg · Reuters · FT · ECB · Fed...</div>
  <div id="errorMsg" class="error" style="display:none"></div>
  <div id="result">
    <div class="sections" id="sections"></div>
    <div class="footer-ts" id="ts"></div>
    <div class="btn-wrap"><button onclick="generate()">↺ AGGIORNA</button></div>
  </div>
</main>
<script>
const COLORS = {
  "AZIONARIO MONDIALE": "#4fc3f7",
  "TASSI & OBBLIGAZIONARIO": "#81c784",
  "FOREX & COMMODITIES": "#ffb74d",
  "MARKET MOVERS": "#f06292",
  "MACRO IN AGENDA": "#ce93d8",
  "SEGNALE DELLA SETTIMANA": "#fff176"
};

document.getElementById("dateStr").textContent = new Date().toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

function parseSections(text) {
  const sections = [];
  let current = null;
  for (const line of text.split("\n")) {
    const m = line.match(/^#{1,3}\s+(.+)/);
    if (m) {
      if (current) sections.push(current);
      current = { title: m[1].trim(), lines: [] };
    } else if (current) current.lines.push(line);
  }
  if (current) sections.push(current);
  return sections;
}

async function generate() {
  const dot = document.getElementById("dot");
  const btn = document.getElementById("btn");
  document.getElementById("hero").style.display = "none";
  document.getElementById("loadingMsg").style.display = "block";
  document.getElementById("errorMsg").style.display = "none";
  document.getElementById("result").style.display = "none";
  dot.className = "dot loading";
  if (btn) btn.disabled = true;

  try {
    const res = await fetch("/api/briefing", { method: "POST" });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Errore sconosciuto");

    const sections = parseSections(data.text);
    const container = document.getElementById("sections");
    container.innerHTML = sections.map(s => {
      const color = COLORS[s.title] || "#e0e0e0";
      const lines = s.lines.filter(l => l.trim()).map(l =>
        `<p>${l.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/^[-•]\s*/, "› ")}</p>`
      ).join("");
      return `<div class="section" style="border-color:${color}">
        <div class="section-title" style="color:${color}">${s.title}</div>
        <div class="section-body">${lines}</div>
      </div>`;
    }).join("");

    document.getElementById("ts").textContent = `generato alle ${new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" })} · ${document.getElementById("dateStr").textContent}`;
    document.getElementById("loadingMsg").style.display = "none";
    document.getElementById("result").style.display = "block";
    dot.className = "dot ready";
  } catch (e) {
    document.getElementById("errorMsg").textContent = "⚠ " + e.message;
    document.getElementById("errorMsg").style.display = "block";
    document.getElementById("loadingMsg").style.display = "none";
    document.getElementById("hero").style.display = "block";
    dot.className = "dot";
    if (btn) btn.disabled = false;
  }
}
</script>
</body>
</html>
